version: "2"
sql:
  - engine: "postgresql"
    queries: "sqlc/queries/"
    schema: "sqlc/schema/"
    gen:
      go:
        package: "sqlcdb"
        out: "infrastructure/database/sqlc"
        emit_json_tags: true
        emit_interface: false
        emit_prepared_queries: false
        emit_exact_table_names: false
